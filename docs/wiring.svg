<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Arduino Nano Every solenoid low-side MOSFET wiring diagram</title>
  <desc id="desc">Two solenoids are driven by N-channel MOSFET low-side switches. Arduino ground and external power supply ground are common. Flyback diodes are connected across each solenoid.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .panel { fill: #ffffff; stroke: #343434; stroke-width: 2; }
      .soft-panel { fill: #fffaf0; stroke: #8a6d3b; stroke-width: 2; }
      .wire-power { fill: none; stroke: #d72638; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire-power-optional { fill: none; stroke: #d72638; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 8; }
      .wire-gnd { fill: none; stroke: #202020; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire-signal { fill: none; stroke: #1464c0; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .wire-switched { fill: none; stroke: #236b45; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire-node { fill: #ffffff; stroke-width: 4; }
      .node-power { stroke: #d72638; }
      .node-gnd { stroke: #202020; }
      .node-signal { stroke: #1464c0; }
      .device { fill: #f2f6ff; stroke: #2b4c7e; stroke-width: 2; }
      .solenoid { fill: #fff5f3; stroke: #9e2a2b; stroke-width: 2; }
      .mosfet { fill: #f0fbf6; stroke: #236b45; stroke-width: 2; }
      .resistor { fill: #fbfbfb; stroke: #575757; stroke-width: 2; }
      .diode { fill: #fff; stroke: #6b4f00; stroke-width: 2; }
      .title { font: 700 34px Arial, "Yu Gothic", "Meiryo", sans-serif; fill: #1f1f1f; }
      .subtitle { font: 18px Arial, "Yu Gothic", "Meiryo", sans-serif; fill: #444; }
      .label { font: 18px Arial, "Yu Gothic", "Meiryo", sans-serif; fill: #1f1f1f; }
      .small { font: 15px Arial, "Yu Gothic", "Meiryo", sans-serif; fill: #333; }
      .tiny { font: 13px Arial, "Yu Gothic", "Meiryo", sans-serif; fill: #333; }
      .pin { font: 700 17px Arial, "Yu Gothic", "Meiryo", sans-serif; fill: #ffffff; }
      .callout { fill: #fff7d6; stroke: #c08b00; stroke-width: 2; }
      .callout-text { font: 16px Arial, "Yu Gothic", "Meiryo", sans-serif; fill: #3f3100; }
    </style>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d72638"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1464c0"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="860"/>
  <text class="title" x="52" y="62">チク・タク音源ユニット 配線図</text>
  <text class="subtitle" x="54" y="94">Arduino Nano Every + 2SK4017 ローサイド駆動 + CBS08300120 ソレノイド x2</text>

  <rect class="panel" x="54" y="140" width="250" height="470" rx="8"/>
  <text class="label" x="82" y="178">Arduino Nano Every</text>
  <text class="small" x="82" y="205">5V GPIO / 115200bps</text>
  <rect x="84" y="250" width="66" height="34" rx="5" fill="#1464c0"/>
  <text class="pin" x="104" y="273">D5</text>
  <text class="small" x="164" y="273">tick gate</text>
  <rect x="84" y="350" width="66" height="34" rx="5" fill="#1464c0"/>
  <text class="pin" x="104" y="373">D6</text>
  <text class="small" x="164" y="373">tock gate</text>
  <rect x="84" y="474" width="66" height="34" rx="5" fill="#202020"/>
  <text class="pin" x="96" y="497">GND</text>
  <text class="small" x="164" y="497">外部電源GNDと共通</text>
  <rect x="84" y="548" width="66" height="34" rx="5" fill="#d72638"/>
  <text class="pin" x="98" y="571">VIN</text>
  <text class="small" x="164" y="571">7V以上の時だけ +V へ</text>

  <rect class="soft-panel" x="54" y="648" width="250" height="120" rx="8"/>
  <text class="label" x="82" y="686">外部ソレノイド電源</text>
  <text class="small" x="82" y="715">まず 5V〜6V から開始</text>
  <text class="small" x="82" y="742">必要なら 7.5V / 9V / 12V</text>
  <circle cx="279" cy="690" r="12" fill="#d72638"/>
  <text class="pin" x="271" y="697">+</text>
  <circle cx="279" cy="735" r="12" fill="#202020"/>
  <text class="pin" x="273" y="742">-</text>

  <line class="wire-power" x1="279" y1="690" x2="1115" y2="690"/>
  <line class="wire-power-optional" x1="279" y1="690" x2="252" y2="690"/>
  <line class="wire-power-optional" x1="252" y1="690" x2="252" y2="565"/>
  <line class="wire-power-optional" x1="252" y1="565" x2="150" y2="565"/>
  <line class="wire-gnd" x1="279" y1="735" x2="1115" y2="735"/>
  <line class="wire-gnd" x1="150" y1="491" x2="232" y2="491"/>
  <line class="wire-gnd" x1="232" y1="491" x2="232" y2="735"/>
  <circle class="wire-node node-gnd" cx="232" cy="735" r="7"/>
  <text class="small" x="377" y="724">+V bus</text>
  <text class="small" x="377" y="760">GND bus</text>

  <rect class="panel" x="360" y="142" width="850" height="212" rx="8"/>
  <text class="label" x="386" y="177">tick チャンネル</text>
  <text class="small" x="386" y="204">GPIO HIGH → MOSFET ON → ソレノイド通電</text>

  <rect class="resistor" x="390" y="252" width="74" height="30" rx="4"/>
  <text class="small" x="407" y="273">220Ω</text>
  <line class="wire-signal" x1="150" y1="267" x2="390" y2="267" marker-end="url(#arrow-blue)"/>
  <line class="wire-signal" x1="464" y1="267" x2="538" y2="267"/>

  <rect class="mosfet" x="538" y="220" width="132" height="104" rx="7"/>
  <text class="label" x="566" y="258">2SK4017</text>
  <text class="small" x="572" y="286">Nch MOSFET</text>
  <text class="tiny" x="546" y="240">G</text>
  <text class="tiny" x="642" y="238">D</text>
  <text class="tiny" x="642" y="315">S</text>
  <line class="wire-gnd" x1="604" y1="324" x2="604" y2="735"/>
  <circle class="wire-node node-gnd" cx="604" cy="735" r="7"/>

  <rect class="resistor" x="496" y="304" width="30" height="72" rx="4"/>
  <text class="tiny" x="489" y="344" transform="rotate(-90 489 344)">10kΩ pulldown</text>
  <line class="wire-signal" x1="511" y1="267" x2="511" y2="304"/>
  <line class="wire-gnd" x1="511" y1="376" x2="511" y2="735"/>
  <circle class="wire-node node-signal" cx="511" cy="267" r="6"/>
  <circle class="wire-node node-gnd" cx="511" cy="735" r="7"/>

  <rect class="solenoid" x="816" y="190" width="170" height="74" rx="7"/>
  <text class="label" x="848" y="224">tick ソレノイド</text>
  <text class="small" x="852" y="249">CBS08300120</text>
  <line class="wire-power" x1="901" y1="190" x2="901" y2="690"/>
  <circle class="wire-node node-power" cx="901" cy="690" r="7"/>
  <line class="wire-switched" x1="670" y1="242" x2="816" y2="242"/>
  <line class="wire-switched" x1="670" y1="242" x2="670" y2="272"/>

  <rect class="diode" x="828" y="288" width="150" height="38" rx="5"/>
  <text class="small" x="854" y="313">1N5822 flyback</text>
  <line class="wire-power" x1="978" y1="307" x2="1040" y2="307"/>
  <line class="wire-power" x1="1040" y1="307" x2="1040" y2="690"/>
  <circle class="wire-node node-power" cx="1040" cy="690" r="7"/>
  <line class="wire-switched" x1="670" y1="307" x2="828" y2="307"/>
  <text class="tiny" x="993" y="294">カソード(線) +V側</text>
  <text class="tiny" x="705" y="294">アノード Drain側</text>

  <rect class="panel" x="360" y="392" width="850" height="212" rx="8"/>
  <text class="label" x="386" y="427">tock チャンネル</text>
  <text class="small" x="386" y="454">tick と同じ構成。コード側で同時ONを避けます。</text>

  <rect class="resistor" x="390" y="502" width="74" height="30" rx="4"/>
  <text class="small" x="407" y="523">220Ω</text>
  <line class="wire-signal" x1="150" y1="367" x2="330" y2="367"/>
  <line class="wire-signal" x1="330" y1="367" x2="330" y2="517"/>
  <line class="wire-signal" x1="330" y1="517" x2="390" y2="517" marker-end="url(#arrow-blue)"/>
  <line class="wire-signal" x1="464" y1="517" x2="538" y2="517"/>

  <rect class="mosfet" x="538" y="470" width="132" height="104" rx="7"/>
  <text class="label" x="566" y="508">2SK4017</text>
  <text class="small" x="572" y="536">Nch MOSFET</text>
  <text class="tiny" x="546" y="490">G</text>
  <text class="tiny" x="642" y="488">D</text>
  <text class="tiny" x="642" y="565">S</text>
  <line class="wire-gnd" x1="604" y1="574" x2="604" y2="735"/>
  <circle class="wire-node node-gnd" cx="604" cy="735" r="7"/>

  <rect class="resistor" x="496" y="554" width="30" height="72" rx="4"/>
  <text class="tiny" x="489" y="594" transform="rotate(-90 489 594)">10kΩ pulldown</text>
  <line class="wire-signal" x1="511" y1="517" x2="511" y2="554"/>
  <line class="wire-gnd" x1="511" y1="626" x2="511" y2="735"/>
  <circle class="wire-node node-signal" cx="511" cy="517" r="6"/>
  <circle class="wire-node node-gnd" cx="511" cy="735" r="7"/>

  <rect class="solenoid" x="816" y="440" width="170" height="74" rx="7"/>
  <text class="label" x="846" y="474">tock ソレノイド</text>
  <text class="small" x="852" y="499">CBS08300120</text>
  <line class="wire-power" x1="901" y1="440" x2="901" y2="690"/>
  <circle class="wire-node node-power" cx="901" cy="690" r="7"/>
  <line class="wire-switched" x1="670" y1="492" x2="816" y2="492"/>
  <line class="wire-switched" x1="670" y1="492" x2="670" y2="522"/>

  <rect class="diode" x="828" y="538" width="150" height="38" rx="5"/>
  <text class="small" x="854" y="563">1N5822 flyback</text>
  <line class="wire-power" x1="978" y1="557" x2="1040" y2="557"/>
  <line class="wire-power" x1="1040" y1="557" x2="1040" y2="690"/>
  <circle class="wire-node node-power" cx="1040" cy="690" r="7"/>
  <line class="wire-switched" x1="670" y1="557" x2="828" y2="557"/>
  <text class="tiny" x="993" y="544">カソード(線) +V側</text>
  <text class="tiny" x="705" y="544">アノード Drain側</text>

  <rect class="callout" x="820" y="628" width="390" height="172" rx="8"/>
  <text class="callout-text" x="844" y="662">重要</text>
  <text class="callout-text" x="844" y="692">1. Arduino GND と外部電源 GND は必ず共通</text>
  <text class="callout-text" x="844" y="722">2. ソレノイドは GPIO 直結禁止</text>
  <text class="callout-text" x="844" y="752">3. フライバックダイオードを各コイルに入れる</text>
  <text class="callout-text" x="844" y="782">4. VIN給電は7V以上。5V〜6V試験時はUSB等で給電</text>

  <rect x="54" y="805" width="1156" height="1" fill="#c9c0b4"/>
  <text class="tiny" x="56" y="832">配線図は概念図です。実配線では MOSFET の実ピン配置、電源容量、配線太さ、絶縁、発熱を確認してください。</text>
</svg>
